name: Release

# Push a version tag to build installers and publish a GitHub Release:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build installers (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: '--mac' # produces the .dmg
          - os: windows-latest
            target: '--win' # produces the .exe (NSIS installer)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      # Builds the platform installer and uploads it to the GitHub Release for
      # the tag. GITHUB_TOKEN is provided automatically by Actions.
      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.target }} --publish always
