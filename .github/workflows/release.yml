name: Release

# Push a version tag to build installers and publish a single GitHub Release:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Each OS builds its installer and uploads it as an artifact — no publishing
  # here, so the two jobs can't race to create separate releases.
  build:
    name: Build installers (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: '--mac' # .dmg
          - os: windows-latest
            target: '--win' # .exe (NSIS)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder ${{ matrix.target }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  # A single job collects every artifact and publishes ONE release for the tag.
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          fail_on_unmatched_files: true
