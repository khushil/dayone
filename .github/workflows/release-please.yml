name: Release

# release-please owns versioning + the release. Merging its PR creates the tag
# and a DRAFT release; the build matrix uploads installers to that draft, then a
# single publish step flips it public. No manual tags; GITHUB_TOKEN only.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / draft release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build installers (${{ matrix.os }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: '--mac'
          - os: windows-latest
            target: '--win'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # Guard: package.json version must match the release tag.
      - name: Assert version matches tag
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          v="$(node -p "require('./package.json').version")"
          [ "v$v" = "$TAG" ] || { echo "::error::package.json $v != tag $TAG"; exit 1; }
      - run: npm run build
      - run: npx electron-builder ${{ matrix.target }} --publish never
      - name: Upload installers to the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.exe dist/*.zip dist/*.blockmap dist/latest*.yml)
          gh release upload "$TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  publish:
    name: Publish release
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Flip the draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
